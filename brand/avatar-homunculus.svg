<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="78%">
      <stop offset="0%" stop-color="#16222c"/><stop offset="62%" stop-color="#0e161d"/><stop offset="100%" stop-color="#070b0f"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ef0b0"/><stop offset="55%" stop-color="#26c488"/><stop offset="100%" stop-color="#129a68"/>
    </linearGradient>
    <radialGradient id="belly" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#c7ffe9" stop-opacity="0.9"/><stop offset="100%" stop-color="#26c488" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="#2bd497" stroke-opacity="0.28" stroke-width="4"/>

  <!-- árvore de comportamento = "mente" do homúnculo -->
  <g stroke="#8fb0c0" stroke-opacity="0.5" stroke-width="3.5" fill="none" stroke-linecap="round">
    <path d="M256 198 C 256 150, 206 150, 184 118"/>
    <path d="M256 198 C 256 150, 306 150, 328 118"/>
    <path d="M184 118 C 172 100, 146 100, 132 88"/>
    <path d="M184 118 C 196 98, 220 98, 230 82"/>
    <path d="M328 118 C 340 100, 366 100, 380 88"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="256" cy="198" r="7" fill="#cfe9ff"/>
    <circle cx="132" cy="88" r="10" fill="#39d98a"/>
    <circle cx="230" cy="82" r="8.5" fill="#ffb020"/>
    <circle cx="380" cy="88" r="10" fill="#4aa3ff"/>
    <circle cx="184" cy="118" r="5.5" fill="#9fb6c4"/>
    <circle cx="328" cy="118" r="5.5" fill="#9fb6c4"/>
  </g>

  <!-- sombra flutuante -->
  <ellipse cx="256" cy="432" rx="96" ry="20" fill="#000" opacity="0.38" filter="url(#soft)"/>

  <!-- corpo (blob homúnculo) -->
  <path d="M256 196 C 332 196, 374 250, 374 314 C 374 384, 324 418, 256 418 C 188 418, 138 384, 138 314 C 138 250, 180 196, 256 196 Z" fill="url(#body)" stroke="#0c5b40" stroke-width="3"/>
  <ellipse cx="256" cy="302" rx="96" ry="98" fill="url(#belly)"/>
  <ellipse cx="218" cy="240" rx="44" ry="22" fill="#ffffff" opacity="0.18"/>

  <!-- olhos grandes -->
  <ellipse cx="212" cy="302" rx="35" ry="42" fill="#0b1015"/>
  <ellipse cx="300" cy="302" rx="35" ry="42" fill="#0b1015"/>
  <circle cx="222" cy="290" r="12" fill="#eafff6"/>
  <circle cx="310" cy="290" r="12" fill="#eafff6"/>
  <circle cx="205" cy="316" r="5.5" fill="#39d98a" opacity="0.85"/>
  <circle cx="293" cy="316" r="5.5" fill="#39d98a" opacity="0.85"/>

  <!-- boca + bochechas -->
  <path d="M236 348 Q 256 366 276 348" fill="none" stroke="#0b1015" stroke-width="6.5" stroke-linecap="round"/>
  <circle cx="176" cy="336" r="13" fill="#ff8aa0" opacity="0.22"/>
  <circle cx="336" cy="336" r="13" fill="#ff8aa0" opacity="0.22"/>

  <!-- wordmark -->
  <text x="256" y="468" text-anchor="middle" font-family="'Trebuchet MS', Verdana, system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="3" fill="#e6f3fb">BR-AI</text>
</svg>
