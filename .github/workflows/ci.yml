name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  lua-tests:
    name: Testes Lua (Lua ${{ matrix.lua }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lua: [ "5.1", "5.3", "5.4" ]   # 5.1 = baseline do cliente do RO; 5.3/5.4 = VMs modernas
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Lua ${{ matrix.lua }}
        run: |
          sudo apt-get update
          sudo apt-get install -y "lua${{ matrix.lua }}"
          lua${{ matrix.lua }} -v

      - name: Rodar a suíte de testes (tools/*_test.lua + outputs_chk.lua)
        run: node tools/run_lua_tests.js "lua${{ matrix.lua }}"

  desktop-smokes:
    name: Smokes desktop (ponte Fengari, visualizações, persistência)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Instalar dependências (Fengari)
        run: npm ci
        working-directory: desktop

      - name: Smokes (a mesma árvore Lua rodando via Fengari, sem UI)
        working-directory: desktop
        run: |
          npm run viz-smoke
          npm run sera-viz-smoke
          npm run persist-smoke
          npm run host-smoke
          npm run test:bridge
          npm run test:ui
          npm run test:buildtree
          npm run test:buildtreeweb
          npm run test:luahost
          npm run test:s3
          npm run smoke:statichost
          npm run test:buildstatic
          npm run test:migration

  lint:
    name: Lint (luacheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Rodar luacheck (config em .luacheckrc)
        run: luacheck lua tools outputs_chk.lua

  dist-packages:
    name: Pacotes dist/ (artefatos de build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Gerar dist/ + .zip de todas as árvores (headless, sem Electron)
        run: node tools/build_all_dists.js

      - name: Publicar os .zip como artefatos
        uses: actions/upload-artifact@v4
        with:
          name: brai-dist-packages
          path: trees/*/*.zip
          if-no-files-found: error

  browser-smokes:
    name: "Smokes de browser (Playwright web + estatica)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: desktop

      - name: Instalar Chromium (Playwright)
        run: npx playwright install --with-deps chromium
        working-directory: desktop

      - name: Smoke WEB (refatoracao fs_bridge/lua_host_web em browser real)
        run: npm run smoke:web
        working-directory: desktop

      - name: Smoke ESTATICA (S3 backend + bundle Lua + regra de storage)
        run: npm run smoke:static-browser
        working-directory: desktop

      - name: Smoke feature "desativar no"
        run: npm run smoke:disabled
        working-directory: desktop

      - name: Smoke editor (reparentar/reordenar)
        run: npm run smoke:reparent
        working-directory: desktop

      - name: Smoke migracao (AzzyAI -> editor em browser real)
        run: npm run smoke:migration
        working-directory: desktop

      - name: Smoke tela de Skills por homunculo
        run: npm run smoke:skills
        working-directory: desktop
